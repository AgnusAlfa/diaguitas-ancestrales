<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorice Diaguita | Diaguitas Ancestrales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .carta {
            height: 120px;
            cursor: pointer;
            perspective: 1000px; /* Le da el efecto 3D al girar */
        }
        .carta-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .carta.volteada .carta-inner {
            transform: rotateY(180deg);
        }
        .carta-front, .carta-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 2rem;
        }
        /* La parte de atrás (lo que se ve al inicio) */
        .carta-back {
            background-color: var(--diaguita-rojo);
            color: white;
            border: 2px solid var(--diaguita-rojo-oscuro);
        }
        /* La parte de adelante (el dibujo escondido) */
        .carta-front {
            background-color: white;
            color: var(--diaguita-negro);
            transform: rotateY(180deg);
            border: 2px solid #ccc;
        }
    </style>
</head>
<body class="bg-diaguita-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-diaguita-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏺 Diaguitas Ancestrales</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="memorice.html">Memorice</a></li>
                    <li class="nav-item"><a class="nav-link" href="sopa-letras.html">Sopa de Letras</a></li>
                    <li class="nav-item"><a class="nav-link" href="rompecabezas.html">Rompecabezas</a></li>
                    <li class="nav-item"><a class="nav-link" href="trivia.html">Trivia</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 text-center">
                <h2 class="text-diaguita-primary mb-3">Memorice Ancestral</h2>
                <div class="d-flex justify-content-between mb-4">
                    <p class="fw-bold text-muted">Movimientos: <span id="contador-movimientos">0</span></p>
                    <button id="btn-reiniciar" class="btn btn-outline-secondary btn-sm">Reiniciar Juego</button>
                </div>

                <div id="tablero-memorice" class="row g-3">
                    </div>

                <div id="mensaje-victoria" class="alert alert-success mt-4 d-none" role="alert">
                    ¡Felicidades! Has encontrado todos los pares con gran sabiduría.
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
