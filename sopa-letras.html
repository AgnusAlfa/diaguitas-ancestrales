<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras | Diaguitas Ancestrales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        /* Estilos específicos para el tablero de letras */
        #tablero-sopa {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 8 columnas del mismo tamaño */
            gap: 5px;
            max-width: 400px;
            margin: 0 auto;
        }
        .letra-sopa {
            background-color: white;
            border: 2px solid var(--diaguita-crema);
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            user-select: none; /* Evita que el texto se sombree como texto normal */
            transition: all 0.2s;
        }
        /* Cuando el usuario hace clic en una letra */
        .letra-sopa.seleccionada {
            background-color: var(--diaguita-rojo);
            color: white;
            transform: scale(1.1);
        }
        /* Cuando la palabra fue encontrada correctamente */
        .letra-sopa.encontrada {
            background-color: #198754; /* Verde éxito de Bootstrap */
            color: white;
            border-color: #198754;
            pointer-events: none; /* Ya no se puede hacer clic */
        }
        .palabra-lista {
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        .palabra-lista.tachada {
            text-decoration: line-through;
            color: #198754;
        }
    </style>
</head>
<body class="bg-diaguita-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-diaguita-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏺 Diaguitas Ancestrales</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="memorice.html">Memorice</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sopa-letras.html">Sopa de Letras</a></li>
                    <li class="nav-item"><a class="nav-link" href="rompecabezas.html">Rompecabezas</a></li>
                    <li class="nav-item"><a class="nav-link" href="trivia.html">Trivia</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="card shadow border-0 p-4">
                    <h3 class="text-center text-diaguita-primary mb-4">Encuentra los conceptos</h3>
                    
                    <div id="tablero-sopa"></div>
                    
                    <div class="mt-4 text-center">
                        <p class="text-muted mb-1">Palabra actual:</p>
                        <h4 id="palabra-actual" class="text-diaguita-dark fw-bold mb-3" style="min-height: 30px;">...</h4>
                        <button id="btn-limpiar" class="btn btn-outline-secondary">Limpiar Selección</button>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow border-0 p-4 h-100 bg-diaguita-primary text-white">
                    <h4 class="mb-4">Palabras Ocultas</h4>
                    <ul id="lista-palabras" class="list-unstyled">
                        <li class="palabra-lista mb-2" id="palabra-ELQUI">ELQUI</li>
                        <li class="palabra-lista mb-2" id="palabra-GREDA">GREDA</li>
                        <li class="palabra-lista mb-2" id="palabra-JARRO">JARRO</li>
                        <li class="palabra-lista mb-2" id="palabra-CHANGO">CHANGO</li>
                    </ul>

                    <div id="mensaje-victoria-sopa" class="alert alert-light text-diaguita-primary mt-auto d-none" role="alert">
                        <strong>¡Excelente!</strong> Has descubierto todos los conceptos del valle.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/sopa-letras.js"></script>
</body>
</html>
